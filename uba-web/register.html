<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UBA — Register Identity Token</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
  style="background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a)">

  <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle,#6fc6e6 1px,transparent 1px);background-size:40px 40px;"></div>

  <div class="relative w-full max-w-2xl z-10">
    <div class="flex items-center gap-4 mb-8">
      <a href="index.html" class="text-uba-400 hover:text-white transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="flex items-center gap-3">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#3fb3dd,#11455f)">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        </div>
        <div>
          <h1 class="text-2xl font-extrabold text-white">Register Identity Token</h1>
          <p class="text-uba-400 text-sm">Establish your UBA operator credentials</p>
        </div>
      </div>
    </div>

    <div class="rounded-3xl shadow-2xl p-8 border border-white/10" style="background:rgba(255,255,255,0.08);backdrop-filter:blur(20px)">
      <form onsubmit="handleRegister(event)" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-uba-200 mb-1.5">Full Name</label>
            <input type="text" placeholder="Alex Morgan" required
              class="w-full px-4 py-3 rounded-xl text-sm text-white placeholder-uba-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-uba-500 transition"
              style="background:rgba(255,255,255,0.08)" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-uba-200 mb-1.5">Email Address</label>
            <input type="email" placeholder="alex@uba-ops.com" required
              class="w-full px-4 py-3 rounded-xl text-sm text-white placeholder-uba-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-uba-500 transition"
              style="background:rgba(255,255,255,0.08)" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-uba-200 mb-1.5">Phone Number</label>
            <input type="tel" placeholder="+61 412 000 000"
              class="w-full px-4 py-3 rounded-xl text-sm text-white placeholder-uba-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-uba-500 transition"
              style="background:rgba(255,255,255,0.08)" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-uba-200 mb-1.5">Department</label>
            <select class="w-full px-4 py-3 rounded-xl text-sm text-white border border-white/20 appearance-none focus:outline-none focus:ring-2 focus:ring-uba-500 transition"
              style="background:rgba(255,255,255,0.08)">
              <option style="background:#1e293b">Select department…</option>
              <option style="background:#1e293b">Field Operations</option>
              <option style="background:#1e293b">Zone Management</option>
              <option style="background:#1e293b">Project Direction</option>
              <option style="background:#1e293b">Asset Coordination</option>
              <option style="background:#1e293b">Compliance &amp; Safety</option>
              <option style="background:#1e293b">Platform Administration</option>
            </select>
          </div>
        </div>

        <div class="border-t border-white/10 pt-5">
          <p class="text-sm font-semibold text-uba-200 mb-4">Upload Credentials</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <label class="block border-2 border-dashed border-white/20 rounded-2xl p-6 text-center cursor-pointer hover:border-uba-500 hover:bg-white/5 transition" id="licenseZone">
              <input type="file" accept=".pdf,.jpg,.jpeg,.png" class="hidden" onchange="fileChosen('licenseZone','licenseName',this)">
              <svg class="mx-auto mb-2 text-uba-400" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3fb3dd" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <p class="text-sm font-semibold text-white">Operator License</p>
              <p class="text-xs text-uba-400 mt-1" id="licenseName">PDF, JPG, PNG — max 5MB</p>
            </label>
            <label class="block border-2 border-dashed border-white/20 rounded-2xl p-6 text-center cursor-pointer hover:border-uba-500 hover:bg-white/5 transition" id="clearanceZone">
              <input type="file" accept=".pdf,.jpg,.jpeg,.png" class="hidden" onchange="fileChosen('clearanceZone','clearanceName',this)">
              <svg class="mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <p class="text-sm font-semibold text-white">Site Clearance Certificate</p>
              <p class="text-xs text-uba-400 mt-1" id="clearanceName">PDF, JPG, PNG — max 5MB</p>
            </label>
          </div>
        </div>

        <button type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-base flex items-center justify-center gap-2 transition-all shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Submit Identity Registration
        </button>
      </form>
    </div>
  </div>

  <!-- Success overlay -->
  <div id="successOverlay" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background:rgba(0,0,0,0.8)">
    <div class="text-center">
      <div class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 class="text-3xl font-bold text-white mb-2">Identity Token Submitted</h2>
      <p class="text-uba-300">Your registration is pending verification. Redirecting to login…</p>
    </div>
  </div>

  <script>
    function fileChosen(zoneId, nameId, input) {
      if (input.files[0]) {
        document.getElementById(nameId).textContent = input.files[0].name
        document.getElementById(zoneId).style.borderColor = '#10b981'
      }
    }
    function handleRegister(e) {
      e.preventDefault()
      document.getElementById('successOverlay').classList.remove('hidden')
      setTimeout(() => { window.location.href = 'index.html' }, 2500)
    }
  </script>
</body>
</html>

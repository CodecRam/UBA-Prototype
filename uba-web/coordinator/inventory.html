<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UBA — Inventory Management</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/style.css"/></head>
<body class="font-sans min-h-screen flex flex-col">
  <header class="h-16 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-[1440px] mx-auto px-6 h-full flex items-center justify-between gap-6">
      <div class="flex items-center gap-3 shrink-0"><div class="w-9 h-9 bg-cyan-700 rounded-lg flex items-center justify-center shadow"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div><span class="text-lg font-bold text-slate-900 tracking-tight">UBA</span></div>
      <div class="flex items-center gap-2.5 px-3 shrink-0"><div class="w-9 h-9 rounded-full bg-amber-600 flex items-center justify-center text-white text-sm font-bold">TK</div><div class="hidden md:block"><p class="text-sm font-semibold text-slate-900">Tyler Kim</p><p class="text-xs text-slate-500">Asset Coordinator</p></div><a href="../index.html" class="ml-2 text-xs text-rose-600 font-bold hover:underline">Sign Out</a></div>
    </div>
  </header>
  <div class="flex flex-1">
    <aside class="w-60 shrink-0 bg-slate-900 min-h-[calc(100vh-4rem)] flex flex-col">
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🏠 Asset Hub</a>
        <a href="deliveries.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🚛 Deliveries</a>
        <a href="inventory.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-blue-600 text-white shadow-lg">📦 Inventory</a>
        <a href="maps.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🗺️ Zone Maps</a>
      </nav>
      <div class="px-3 pb-4"><div class="border-t border-slate-800 pt-3"><p class="text-xs text-slate-600 text-center">UBA Ops v1.0</p></div></div>
    </aside>
    <main class="flex-1 bg-slate-50 p-8 overflow-y-auto">
      <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex items-start justify-between">
          <div><h1 class="text-3xl font-bold text-slate-900">Inventory Management</h1><p class="text-slate-500 mt-1">Site equipment, materials, and consumable stock levels</p></div>
          <div class="flex gap-3">
            <select id="catFilter" onchange="filterInventory()" class="text-sm border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="">All Categories</option>
              <option value="Heavy Equipment">Heavy Equipment</option>
              <option value="Materials">Materials</option>
              <option value="Tools">Tools</option>
              <option value="Safety">Safety</option>
            </select>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4" id="invStats"></div>

        <!-- Inventory Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5" id="inventoryGrid"></div>
      </div>
    </main>
  </div>
  <script>
    document.getElementById('invStats').innerHTML = [{l:'Total Items',v:'142',c:'text-slate-900',bg:'bg-white'},{l:'In Stock',v:'118',c:'text-emerald-700',bg:'bg-emerald-50'},{l:'Low Stock',v:'16',c:'text-amber-700',bg:'bg-amber-50'},{l:'Out of Stock',v:'8',c:'text-rose-700',bg:'bg-rose-50'}].map(s=>`<div class="${s.bg} rounded-2xl border border-slate-200 shadow-sm p-4 text-center"><p class="text-2xl font-extrabold ${s.c}">${s.v}</p><p class="text-xs text-slate-500 font-medium mt-1">${s.l}</p></div>`).join('')
    const inventory = [
      {id:'AST-TC-001',name:'Tower Crane TC-1',cat:'Heavy Equipment',loc:'Zone B',status:'Operational',stock:1,unit:'unit',icon:'🏗️'},
      {id:'AST-EX-002',name:'Excavator EX-2',cat:'Heavy Equipment',loc:'Zone A',status:'Maintenance',stock:1,unit:'unit',icon:'🚜'},
      {id:'AST-SC-003',name:'Mobile Scaffold Set',cat:'Tools',loc:'Zone C',status:'Operational',stock:8,unit:'sets',icon:'🪜'},
      {id:'MAT-ST-001',name:'Structural Steel Grade 350',cat:'Materials',loc:'Storage A',status:'Low Stock',stock:14,unit:'tonnes',icon:'🔩'},
      {id:'MAT-CN-002',name:'Concrete Mix M40',cat:'Materials',loc:'Storage B',status:'In Stock',stock:320,unit:'m³',icon:'🧱'},
      {id:'MAT-RM-003',name:'Roofing Membrane',cat:'Materials',loc:'Storage C',status:'Out of Stock',stock:0,unit:'sqm',icon:'📦'},
      {id:'SAF-PPE-001',name:'Hard Hats (Class E)',cat:'Safety',loc:'Site Office',status:'In Stock',stock:54,unit:'units',icon:'⛑️'},
      {id:'SAF-HAR-002',name:'Fall Arrest Harnesses',cat:'Safety',loc:'Site Office',status:'Low Stock',stock:6,unit:'units',icon:'🦺'},
      {id:'TLS-WLD-001',name:'Arc Welding Units',cat:'Tools',loc:'Zone C',status:'In Stock',stock:4,unit:'units',icon:'🔧'},
    ]

    function statusStyle(s) {
      if(s==='Operational'||s==='In Stock') return 'bg-emerald-100 text-emerald-700'
      if(s==='Low Stock'||s==='Maintenance') return 'bg-amber-100 text-amber-700'
      return 'bg-rose-100 text-rose-700'
    }

    function filterInventory() {
      const cat = document.getElementById('catFilter').value
      const filtered = cat ? inventory.filter(i=>i.cat===cat) : inventory
      renderInventory(filtered)
    }

    function renderInventory(items) {
      document.getElementById('inventoryGrid').innerHTML = items.map(item=>`
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">${item.cat}</span>
            <span class="px-2.5 py-1 rounded-full text-xs font-bold ${statusStyle(item.status)}">${item.status}</span>
          </div>
          <div class="p-5">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-2xl">${item.icon}</div>
              <div><p class="font-bold text-slate-900">${item.name}</p><p class="text-xs font-mono text-slate-400">${item.id}</p></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-slate-50 rounded-lg p-2.5"><p class="text-xs text-slate-400">Location</p><p class="font-semibold text-slate-800 text-xs">${item.loc}</p></div>
              <div class="bg-slate-50 rounded-lg p-2.5"><p class="text-xs text-slate-400">Stock</p><p class="font-bold text-slate-900 text-sm">${item.stock} ${item.unit}</p></div>
            </div>
            <button class="w-full mt-3 text-blue-600 hover:text-blue-800 text-xs font-bold border border-blue-200 hover:border-blue-400 rounded-lg py-2 transition">View Details →</button>
          </div>
        </div>`).join('')
    }

    renderInventory(inventory)
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UBA — Safety Maps</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/style.css"/></head>
<body class="font-sans min-h-screen flex flex-col">
  <header class="h-16 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-[1440px] mx-auto px-6 h-full flex items-center justify-between gap-6">
      <div class="flex items-center gap-3 shrink-0"><div class="w-9 h-9 bg-cyan-700 rounded-lg flex items-center justify-center shadow"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div><span class="text-lg font-bold text-slate-900 tracking-tight">UBA</span></div>
      <div class="flex items-center gap-2.5 px-3 shrink-0"><div class="w-9 h-9 rounded-full bg-rose-600 flex items-center justify-center text-white text-sm font-bold">NB</div><div class="hidden md:block"><p class="text-sm font-semibold text-slate-900">Nadia Brennan</p><p class="text-xs text-slate-500">Compliance Auditor</p></div><a href="../index.html" class="ml-2 text-xs text-rose-600 font-bold hover:underline">Sign Out</a></div>
    </div>
  </header>
  <div class="flex flex-1">
    <aside class="w-60 shrink-0 bg-slate-900 min-h-[calc(100vh-4rem)] flex flex-col">
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🛡️ Audit Hub</a>
        <a href="maps.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-blue-600 text-white shadow-lg">🗺️ Safety Maps</a>
        <a href="reports.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">📋 Reports</a>
      </nav>
      <div class="px-3 pb-4"><div class="border-t border-slate-800 pt-3"><p class="text-xs text-slate-600 text-center">UBA Ops v1.0</p></div></div>
    </aside>
    <main class="flex-1 bg-slate-50 p-8 overflow-y-auto">
      <div class="max-w-6xl mx-auto space-y-8">
        <div><h1 class="text-3xl font-bold text-slate-900">Safety Maps</h1><p class="text-slate-500 mt-1">Zone safety status, incident locations, and evacuation routes</p></div>

        <!-- Zone Safety Status Grid -->
        <div class="grid grid-cols-2 xl:grid-cols-5 gap-4" id="zoneSafetyGrid"></div>

        <!-- Safety Map -->
        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 class="font-bold text-slate-900">Site Safety Map — Live View</h2>
            <div class="flex items-center gap-2"><span class="w-2 h-2 bg-rose-400 rounded-full animate-pulse"></span><span class="text-xs font-semibold text-rose-600">1 Active Incident</span></div>
          </div>
          <div class="p-6">
            <svg width="100%" viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg" class="rounded-xl" style="background:#f8fafc;min-height:280px">
              <rect x="10" y="10" width="500" height="340" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
              <!-- Zone A - Safe -->
              <rect x="30" y="30" width="140" height="120" rx="6" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="2"/>
              <text x="100" y="88" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Zone A</text>
              <text x="100" y="104" text-anchor="middle" fill="#065f46" font-size="10">✓ Clear</text>
              <!-- Zone B - Incident -->
              <rect x="190" y="30" width="140" height="120" rx="6" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="2"/>
              <text x="260" y="80" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Zone B</text>
              <text x="260" y="96" text-anchor="middle" fill="#991b1b" font-size="10">⚠ Active Incident</text>
              <!-- Incident marker -->
              <circle cx="255" cy="115" r="12" fill="none" stroke="#ef4444" stroke-width="2">
                <animate attributeName="r" values="10;16;10" dur="1.5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
              </circle>
              <text x="255" y="120" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">!</text>
              <!-- Zone C - Safe -->
              <rect x="350" y="30" width="140" height="120" rx="6" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="2"/>
              <text x="420" y="88" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Zone C</text>
              <text x="420" y="104" text-anchor="middle" fill="#065f46" font-size="10">✓ Clear</text>
              <!-- Zone D - Warning -->
              <rect x="30" y="175" width="140" height="120" rx="6" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="2"/>
              <text x="100" y="233" text-anchor="middle" fill="#92400e" font-size="13" font-weight="bold">Zone D</text>
              <text x="100" y="249" text-anchor="middle" fill="#92400e" font-size="10">⚡ Warning</text>
              <!-- Zone E - Locked -->
              <rect x="190" y="175" width="140" height="120" rx="6" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="2" stroke-dasharray="6"/>
              <text x="260" y="233" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Zone E</text>
              <text x="260" y="249" text-anchor="middle" fill="#991b1b" font-size="10">🔒 Locked</text>
              <!-- Evacuation route -->
              <path d="M 100 295 L 260 295 L 420 295 L 500 295" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4" fill="none"/>
              <text x="490" y="318" fill="#3b82f6" font-size="8" text-anchor="end">← Evacuation Route</text>
              <!-- Assembly point -->
              <rect x="450" y="270" width="50" height="30" rx="4" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1.5"/>
              <text x="475" y="282" text-anchor="middle" fill="#065f46" font-size="7" font-weight="bold">ASSEMBLY</text>
              <text x="475" y="293" text-anchor="middle" fill="#065f46" font-size="7">POINT A</text>
            </svg>
          </div>
        </div>

        <!-- Incident Log on Map -->
        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-7">
          <h2 class="font-bold text-slate-900 text-lg mb-5">📍 Geo-Tagged Incidents</h2>
          <div class="space-y-3" id="geoIncidents"></div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const zoneSafety = [
      {name:'Zone A',status:'Clear',sub:'0 incidents',c:'bg-emerald-50 border-emerald-200',tc:'text-emerald-700'},
      {name:'Zone B',status:'Active Incident',sub:'1 open',c:'bg-rose-50 border-rose-200',tc:'text-rose-700'},
      {name:'Zone C',status:'Clear',sub:'0 incidents',c:'bg-emerald-50 border-emerald-200',tc:'text-emerald-700'},
      {name:'Zone D',status:'Warning',sub:'1 alert',c:'bg-amber-50 border-amber-200',tc:'text-amber-700'},
      {name:'Zone E',status:'Locked',sub:'Access suspended',c:'bg-slate-100 border-slate-300',tc:'text-slate-600'},
    ]
    document.getElementById('zoneSafetyGrid').innerHTML = zoneSafety.map(z=>`
      <div class="${z.c} border-2 rounded-2xl p-4 text-center">
        <p class="font-bold text-slate-900 text-sm">${z.name}</p>
        <p class="font-bold ${z.tc} mt-1 text-xs">${z.status}</p>
        <p class="text-xs text-slate-400 mt-0.5">${z.sub}</p>
      </div>`).join('')

    const geoIncidents = [
      {id:'NXS-IR-2041',zone:'Zone B, Level 3',type:'Chemical Spill',coords:'Grid B4-L3',sev:'Medium',state:'Under Review'},
      {id:'NXS-IR-2040',zone:'Zone C, Scaffolding',type:'Near Miss — Fall',coords:'Grid C2-Ext',sev:'High',state:'Escalated'},
      {id:'NXS-IR-2039',zone:'Zone D, Switchboard',type:'Arc Flash Warning',coords:'Grid D1-SB',sev:'Low',state:'Submitted'},
    ]
    const sevC = {High:'bg-rose-100 text-rose-700',Medium:'bg-amber-100 text-amber-700',Low:'bg-slate-100 text-slate-500'}
    document.getElementById('geoIncidents').innerHTML = geoIncidents.map(g=>`
      <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center font-bold text-blue-700 text-sm shrink-0">📍</div>
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-0.5"><span class="font-mono text-xs text-slate-400">${g.id}</span><span class="px-2 py-0.5 rounded-full text-xs font-bold ${sevC[g.sev]}">${g.sev}</span></div>
          <p class="text-sm font-semibold text-slate-900">${g.type}</p>
          <p class="text-xs text-slate-500">${g.zone} · ${g.coords}</p>
        </div>
        <span class="text-xs font-bold px-2.5 py-1 rounded-full ${g.state==='Escalated'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}">${g.state}</span>
      </div>`).join('')
  </script>
</body>
</html>

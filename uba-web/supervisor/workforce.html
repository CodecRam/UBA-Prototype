<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UBA — Workforce Management</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/style.css"/></head>
<body class="font-sans min-h-screen flex flex-col">
  <header class="h-16 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-[1440px] mx-auto px-6 h-full flex items-center justify-between gap-6">
      <div class="flex items-center gap-3 shrink-0"><div class="w-9 h-9 bg-cyan-700 rounded-lg flex items-center justify-center shadow"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div><span class="text-lg font-bold text-slate-900 tracking-tight">UBA</span></div>
      <div class="flex items-center gap-2.5 px-3 py-1.5 rounded-xl shrink-0"><div class="w-9 h-9 rounded-full bg-cyan-600 flex items-center justify-center text-white text-sm font-bold">JS</div><div class="hidden md:block"><p class="text-sm font-semibold text-slate-900">Jamie Smith</p><p class="text-xs text-slate-500">Zone Supervisor</p></div><a href="../index.html" class="ml-2 text-xs text-rose-600 font-bold hover:underline">Sign Out</a></div>
    </div>
  </header>
  <div class="flex flex-1">
    <aside class="w-60 shrink-0 bg-slate-900 min-h-[calc(100vh-4rem)] flex flex-col">
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🏠 Dashboard</a>
        <a href="workforce.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-cyan-600 text-white shadow-lg">👥 Workforce</a>
        <a href="access.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🔑 Access Control</a>
        <a href="contracts.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">📄 Contracts</a>
      </nav>
      <div class="px-3 pb-4"><div class="border-t border-slate-800 pt-3"><p class="text-xs text-slate-600 text-center">UBA Ops v1.0</p></div></div>
    </aside>
    <main class="flex-1 bg-slate-50 p-8 overflow-y-auto">
      <div class="max-w-6xl mx-auto space-y-8">
        <div><h1 class="text-3xl font-bold text-slate-900">Workforce Management</h1><p class="text-slate-500 mt-1">Assign field operatives to tasks and manage zone allocations</p></div>
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
          <!-- Roster -->
          <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-6">
            <h2 class="font-bold text-slate-900 text-lg mb-5">👥 Operative Roster</h2>
            <div class="space-y-3" id="rosterList"></div>
          </div>
          <!-- Task Assignment -->
          <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-6">
            <h2 class="font-bold text-slate-900 text-lg mb-5">✅ Open Task Assignments</h2>
            <div class="space-y-3" id="taskAssignments"></div>
          </div>
        </div>
        <!-- Union info -->
        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-6">
          <h2 class="font-bold text-slate-900 text-lg mb-4">Active Union Agreement</h2>
          <div class="grid grid-cols-3 gap-6 text-sm" id="unionFields"></div>
        </div>
      </div>
    </main>
  </div>
<script>
  const operatives = [
    {id:'OP-001',name:'Alex Morgan',spec:'HVAC & Electrical',zone:'Zone B'},
    {id:'OP-002',name:'Jordan Liu',spec:'Plumbing',zone:'Zone A'},
    {id:'OP-003',name:'Sam Okafor',spec:'Structural Steel',zone:'Zone C'},
    {id:'OP-004',name:'Riley Torres',spec:'Concrete Works',zone:'Zone A'},
    {id:'OP-005',name:'Casey Nguyen',spec:'Scaffolding',zone:'Unassigned'},
    {id:'OP-006',name:'Morgan Patel',spec:'Electrical Systems',zone:'Zone D'},
  ]
  document.getElementById('rosterList').innerHTML = operatives.map(op=>`
    <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
      <div class="w-9 h-9 rounded-xl bg-cyan-100 flex items-center justify-center text-cyan-700 text-xs font-bold">${op.name.split(' ').map(n=>n[0]).join('')}</div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-900">${op.name}</p><p class="text-xs text-slate-500 truncate">${op.spec}</p></div>
      <span class="text-xs font-bold px-2.5 py-1 rounded-full ${op.zone==='Unassigned'?'bg-slate-100 text-slate-600':'bg-cyan-100 text-cyan-700'}">${op.zone}</span>
    </div>`).join('')

  const openTasks = [
    {id:'T-081',title:'Foundation Drainage Install',zone:'Zone A'},
    {id:'T-082',title:'Steel Beam Welding — Block C',zone:'Zone C'},
    {id:'T-083',title:'Electrical Conduit Routing',zone:'Zone B'},
    {id:'T-084',title:'HVAC Riser Installation',zone:'Zone D'},
    {id:'T-085',title:'Subfloor Concrete Pour',zone:'Zone A'},
  ]
  document.getElementById('taskAssignments').innerHTML = openTasks.map(t=>`
    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
      <div class="flex items-start justify-between mb-2">
        <div><p class="text-xs font-mono text-slate-400">${t.id}</p><p class="text-sm font-semibold text-slate-900">${t.title}</p></div>
        <span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">${t.zone}</span>
      </div>
      <div class="flex items-center gap-2">
        <select class="flex-1 text-xs border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500 bg-white text-slate-700">
          <option>Assign operative…</option>
          <option>Alex Morgan</option><option>Jordan Liu</option><option>Sam Okafor</option><option>Riley Torres</option><option>Casey Nguyen</option>
        </select>
        <button class="bg-cyan-600 hover:bg-cyan-700 text-white text-xs font-bold px-3 py-2 rounded-lg transition">Assign →</button>
      </div>
    </div>`).join('')

  const unionFields = [
    {l:'Contract ID',v:'UAG-2026-112'},
    {l:'Union Body',v:'Infrastructure Workers Federation'},
    {l:'Valid Until',v:'31 December 2026'},
  ]
  document.getElementById('unionFields').innerHTML = unionFields.map(f=>`
    <div class="bg-slate-50 rounded-xl p-4 border border-slate-100">
      <p class="text-xs text-slate-500 font-semibold mb-1">${f.l}</p>
      <p class="font-bold text-slate-900">${f.v}</p>
    </div>`).join('')
</script>
</body>
</html>

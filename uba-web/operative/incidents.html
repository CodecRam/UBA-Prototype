<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>UBA — Incident Reporting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body class="font-sans min-h-screen bg-slate-50 pb-24">
  <header class="bg-gradient-to-r from-rose-600 to-rose-700 text-white px-5 py-5">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-xl font-bold">Incident Reporting Centre</h1>
      <p class="text-rose-200 text-sm mt-0.5">Document hazards and track resolution status</p>
    </div>
  </header>

  <!-- Tabs -->
  <div class="flex bg-white border-b border-slate-200 sticky top-0 z-10">
    <button onclick="switchTab('new')" id="tabNew" class="flex-1 py-3.5 text-sm font-semibold transition tab-active">Report New Incident</button>
    <button onclick="switchTab('past')" id="tabPast" class="flex-1 py-3.5 text-sm font-semibold transition tab-inactive">Past Reports</button>
  </div>

  <div class="px-4 py-5 max-w-2xl mx-auto" id="tabContent"></div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-50">
    <div class="flex max-w-2xl mx-auto">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center gap-1 py-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="text-xs font-semibold text-slate-400">Home</span></a>
      <a href="tasks.html" class="flex-1 flex flex-col items-center gap-1 py-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="text-xs font-semibold text-slate-400">Tasks</span></a>
      <a href="incidents.html" class="flex-1 flex flex-col items-center gap-1 py-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg><span class="text-xs font-semibold text-rose-600">Incidents</span><span class="w-8 h-0.5 bg-rose-600 rounded-full"></span></a>
      <a href="knowledge.html" class="flex-1 flex flex-col items-center gap-1 py-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span class="text-xs font-semibold text-slate-400">Knowledge</span></a>
      <a href="profile.html" class="flex-1 flex flex-col items-center gap-1 py-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-xs font-semibold text-slate-400">Profile</span></a>
    </div>
  </nav>

  <script>
    const past = [
      {id:'UBA-IR-2041',title:'Exposed live cable near Zone B scaffolding',zone:'Zone B',sev:'High',status:'Resolved',date:'Jun 3, 2026'},
      {id:'UBA-IR-2038',title:'Spilled hydraulic fluid — equipment bay',zone:'Zone D',sev:'Medium',status:'In Progress',date:'Jun 1, 2026'},
      {id:'UBA-IR-2031',title:'Unsecured overhead load — Crane TC-1',zone:'Zone A',sev:'Low',status:'Closed',date:'May 28, 2026'},
    ]

    const newForm = `
      <form onsubmit="submitIncident(event)" class="space-y-4">
        <p class="text-sm text-slate-600">Document all safety concerns to protect your team and maintain site compliance.</p>
        <label class="block border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center cursor-pointer hover:border-rose-400 hover:bg-rose-50 transition" id="photoZone">
          <input type="file" accept="image/*" class="hidden" onchange="photoChosen(this)">
          <div class="text-slate-400 text-3xl mb-2">📷</div>
          <p class="text-sm font-semibold text-slate-700" id="photoLabel">Upload Evidence Photo</p>
          <p class="text-xs text-slate-400 mt-1">GPS metadata will be automatically embedded</p>
        </label>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Affected Zone</label>
            <select required class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 bg-white">
              <option value="">Select zone…</option>
              <option>Zone A</option><option>Zone B</option><option>Zone C</option><option>Zone D</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Incident Type</label>
            <select required class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 bg-white">
              <option value="">Select type…</option>
              <option>Electrical Hazard</option><option>Fire Risk</option><option>Structural Risk</option>
              <option>Chemical Spill</option><option>Equipment Failure</option><option>Slip / Trip</option><option>Other</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Incident Description</label>
          <textarea required rows="4" placeholder="Describe what you observed, exact location, and any immediate actions taken…" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 resize-none"></textarea>
        </div>
        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs text-slate-600 space-y-1">
          <p class="font-bold text-slate-800 mb-1">On Submission, UBA Will Automatically:</p>
          <p>• Flag the affected zone and update the Digital Twin spatial model</p>
          <p>• Generate formal Incident Record with unique ID (NXS-IR-XXXX)</p>
          <p>• Dispatch notifications to Compliance Auditor and Zone Supervisor</p>
          <p>• Initiate Root Cause Analysis and remediation workflow</p>
        </div>
        <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition shadow-lg text-sm">
          ⚠️ Submit Incident Report
        </button>
      </form>`

    const submitted = `
      <div class="space-y-5">
        <div class="bg-emerald-50 border-2 border-emerald-300 rounded-3xl p-6 text-center">
          <div class="text-5xl mb-3">✅</div>
          <h3 class="font-bold text-emerald-900 text-lg">Incident Report Submitted</h3>
          <p class="text-emerald-700 text-sm mt-1">ID: <span class="font-mono font-bold">UBA-IR-2042</span></p>
        </div>
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
          <p class="text-xs font-bold text-amber-800 mb-2">Automated System Actions Triggered:</p>
          <ul class="space-y-1 text-xs text-amber-700">
            <li>• Zone flagged and digital twin updated with incident metadata</li>
            <li>• Formal incident record UBA-IR-2042 generated</li>
            <li>• Compliance Auditor and Zone Supervisor notified</li>
            <li>• Root cause analysis workflow initiated</li>
          </ul>
        </div>
        <div class="bg-slate-950 rounded-2xl border border-slate-800 p-5 space-y-1.5">
          <p class="text-xs font-bold text-blue-400 mb-2">▶ INCIDENT PIPELINE — PROCESSING</p>
          ${['[Incident Module]: Generating Incident Report ID — UBA-IR-2042…','[Digital Twin]: Flagging affected zone and updating spatial model…','[Notification Engine]: Alerting Compliance Auditor and Zone Supervisor…','[Analytics]: Initiating automated root cause analysis workflow…','[Compliance Portal]: Queuing incident data for regulatory submission…','✓ Incident report successfully created — ID: UBA-IR-2042'].map(l=>`<p class="font-mono text-xs text-slate-300"><span class="text-blue-400 mr-2">▶</span>${l}</p>`).join('')}
        </div>
        <button onclick="location.reload()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl text-sm transition">Report Another Incident</button>
      </div>`

    const pastHtml = `
      <div class="space-y-4">
        ${past.map(r=>`
          <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-5 hover:shadow-xl transition">
            <div class="flex items-start justify-between gap-3 mb-3">
              <div>
                <p class="font-mono text-xs text-slate-400 mb-1">${r.id}</p>
                <p class="font-bold text-slate-900 text-sm leading-snug">${r.title}</p>
              </div>
              <span class="shrink-0 px-2.5 py-1 rounded-full text-xs font-bold ${r.sev==='High'?'bg-rose-100 text-rose-700':r.sev==='Medium'?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-600'}">${r.sev}</span>
            </div>
            <div class="flex flex-wrap gap-3 text-xs text-slate-500 mb-3"><span>${r.zone}</span><span>•</span><span>${r.date}</span></div>
            <div class="flex items-center justify-between">
              <span class="px-3 py-1 rounded-full text-xs font-bold ${r.status==='Resolved'?'bg-emerald-100 text-emerald-700':r.status==='In Progress'?'bg-blue-100 text-blue-700':'bg-slate-100 text-slate-600'}">${r.status}</span>
              <button class="text-blue-600 hover:text-blue-800 text-xs font-semibold transition">View Details →</button>
            </div>
          </div>`).join('')}
      </div>`

    let currentTab = 'new'

    function switchTab(t) {
      currentTab = t
      document.getElementById('tabNew').className = 'flex-1 py-3.5 text-sm font-semibold transition ' + (t==='new'?'tab-active':'tab-inactive')
      document.getElementById('tabPast').className = 'flex-1 py-3.5 text-sm font-semibold transition ' + (t==='past'?'tab-active':'tab-inactive')
      document.getElementById('tabContent').innerHTML = t==='new' ? newForm : pastHtml
    }

    function photoChosen(inp) {
      if(inp.files[0]) { document.getElementById('photoLabel').textContent = inp.files[0].name; document.getElementById('photoZone').style.borderColor='#10b981' }
    }

    function submitIncident(e) {
      e.preventDefault()
      document.getElementById('tabContent').innerHTML = submitted
    }

    switchTab('new')
  </script>
</body>
</html>

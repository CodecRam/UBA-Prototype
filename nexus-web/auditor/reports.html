<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>UBA — Compliance Reports</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/style.css"/></head>
<body class="font-sans min-h-screen flex flex-col">
  <header class="h-16 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-[1440px] mx-auto px-6 h-full flex items-center justify-between gap-6">
      <div class="flex items-center gap-3 shrink-0"><div class="w-9 h-9 bg-cyan-700 rounded-lg flex items-center justify-center shadow"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div><span class="text-lg font-bold text-slate-900 tracking-tight">UBA</span></div>
      <div class="flex items-center gap-2.5 px-3 shrink-0"><div class="w-9 h-9 rounded-full bg-rose-600 flex items-center justify-center text-white text-sm font-bold">NB</div><div class="hidden md:block"><p class="text-sm font-semibold text-slate-900">Nadia Brennan</p><p class="text-xs text-slate-500">Compliance Auditor</p></div><a href="../index.html" class="ml-2 text-xs text-rose-600 font-bold hover:underline">Sign Out</a></div>
    </div>
  </header>
  <div class="flex flex-1">
    <aside class="w-60 shrink-0 bg-slate-900 min-h-[calc(100vh-4rem)] flex flex-col">
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🛡️ Audit Hub</a>
        <a href="maps.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white">🗺️ Safety Maps</a>
        <a href="reports.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-blue-600 text-white shadow-lg">📋 Reports</a>
      </nav>
      <div class="px-3 pb-4"><div class="border-t border-slate-800 pt-3"><p class="text-xs text-slate-600 text-center">UBA Ops v1.0</p></div></div>
    </aside>
    <main class="flex-1 bg-slate-50 p-8 overflow-y-auto">
      <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex items-start justify-between">
          <div><h1 class="text-3xl font-bold text-slate-900">Compliance Reports</h1><p class="text-slate-500 mt-1">Incident history, safety audit records, and regulatory submissions</p></div>
          <button onclick="generateReport()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2.5 rounded-xl transition shadow text-sm flex items-center gap-2">📄 Generate Report</button>
        </div>

        <div class="grid grid-cols-4 gap-4" id="reportMetrics"></div>

        <!-- Report Archive -->
        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">
          <div class="px-6 py-4 bg-slate-800 flex items-center justify-between">
            <h2 class="font-bold text-white text-base">📋 Report Archive</h2>
            <div class="flex gap-2">
              <select class="text-xs bg-blue-600 text-white border border-blue-500 rounded-lg px-3 py-1.5 focus:outline-none">
                <option>All Types</option><option>Incident Report</option><option>Safety Audit</option><option>Regulatory</option>
              </select>
            </div>
          </div>
          <table class="w-full">
            <thead><tr class="bg-slate-50 border-b border-slate-200"><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Report ID</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Title</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Type</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Zone</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Submitted By</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Date</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Status</th><th class="text-left px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wide">Action</th></tr></thead>
            <tbody id="reportTable"></tbody>
          </table>
        </div>

        <!-- Generate modal -->
        <div id="generateModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
            <h3 class="font-bold text-slate-900 text-xl mb-5">Generate Compliance Report</h3>
            <div class="space-y-4">
              <div><label class="text-xs font-bold text-slate-600 uppercase">Report Type</label>
                <select class="w-full mt-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>Incident Summary Report</option><option>Safety Audit Report</option><option>Regulatory Compliance Filing</option><option>Monthly Compliance Summary</option>
                </select>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div><label class="text-xs font-bold text-slate-600 uppercase">Date From</label><input type="date" class="w-full mt-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
                <div><label class="text-xs font-bold text-slate-600 uppercase">Date To</label><input type="date" class="w-full mt-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
              </div>
              <div><label class="text-xs font-bold text-slate-600 uppercase">Zone Scope</label>
                <select class="w-full mt-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>All Zones</option><option>Zone A</option><option>Zone B</option><option>Zone C</option><option>Zone D</option>
                </select>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button onclick="closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition text-sm">Cancel</button>
              <button onclick="confirmGenerate()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition text-sm">Generate →</button>
            </div>
          </div>
        </div>
        <div id="genLog" class="hidden"></div>
      </div>
    </main>
  </div>
  <script>
    document.getElementById('reportMetrics').innerHTML = [{l:'Total Reports (YTD)',v:'34',c:'text-slate-900',bg:'bg-white'},{l:'Regulatory Submissions',v:'8',c:'text-blue-700',bg:'bg-blue-50'},{l:'Avg. Resolution Time',v:'4.2 hrs',c:'text-emerald-700',bg:'bg-emerald-50'},{l:'Outstanding Actions',v:'3',c:'text-amber-700',bg:'bg-amber-50'}].map(m=>`<div class="${m.bg} rounded-2xl border border-slate-200 shadow-sm p-4 text-center"><p class="text-2xl font-extrabold ${m.c}">${m.v}</p><p class="text-xs text-slate-500 font-medium mt-1">${m.l}</p></div>`).join('')
    const reports = [
      {id:'RPT-0041',title:'Monthly Safety Audit — May 2026',type:'Safety Audit',zone:'All Zones',by:'Nadia Brennan',date:'Jun 1, 2026',status:'Submitted'},
      {id:'RPT-0040',title:'Incident NXS-IR-2039 — Resolution Report',type:'Incident Report',zone:'Zone D',by:'Nadia Brennan',date:'May 28, 2026',status:'Closed'},
      {id:'RPT-0039',title:'Q1 Regulatory Compliance Filing',type:'Regulatory',zone:'All Zones',by:'Nadia Brennan',date:'Apr 1, 2026',status:'Approved'},
      {id:'RPT-0038',title:'Zone C Scaffolding Safety Audit',type:'Safety Audit',zone:'Zone C',by:'Nadia Brennan',date:'Mar 18, 2026',status:'Closed'},
      {id:'RPT-0037',title:'Incident NXS-IR-2035 — Chemical Handling',type:'Incident Report',zone:'Zone B',by:'Nadia Brennan',date:'Mar 5, 2026',status:'Closed'},
      {id:'RPT-0036',title:'Jan–Feb Monthly Compliance Summary',type:'Safety Audit',zone:'All Zones',by:'Nadia Brennan',date:'Mar 1, 2026',status:'Closed'},
    ]
    const typeC = {'Safety Audit':'bg-blue-100 text-blue-700','Incident Report':'bg-rose-100 text-rose-700','Regulatory':'bg-cyan-100 text-cyan-700'}
    const stateC = {'Submitted':'bg-amber-100 text-amber-700','Closed':'bg-slate-100 text-slate-500','Approved':'bg-emerald-100 text-emerald-700'}
    document.getElementById('reportTable').innerHTML = reports.map((r,i)=>`
      <tr class="border-b border-slate-100 hover:bg-slate-50 transition ${i%2?'bg-slate-50/50':''}">
        <td class="px-4 py-3 font-mono text-xs text-slate-500">${r.id}</td>
        <td class="px-4 py-3 text-sm font-semibold text-slate-900">${r.title}</td>
        <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${typeC[r.type]}">${r.type}</span></td>
        <td class="px-4 py-3 text-xs text-slate-600">${r.zone}</td>
        <td class="px-4 py-3 text-xs text-slate-600">${r.by}</td>
        <td class="px-4 py-3 text-xs text-slate-500">${r.date}</td>
        <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${stateC[r.status]}">${r.status}</span></td>
        <td class="px-4 py-3 flex gap-2"><button class="text-blue-600 hover:text-blue-800 text-xs font-semibold">View</button><button class="text-slate-400 hover:text-slate-600 text-xs">↓</button></td>
      </tr>`).join('')

    function generateReport() { document.getElementById('generateModal').classList.remove('hidden') }
    function closeModal() { document.getElementById('generateModal').classList.add('hidden') }
    const genLogs = ['[Compliance Engine]: Collecting incident data for scope…','[Analytics]: Calculating safety KPIs and metrics…','[Document Generator]: Applying regulatory template RPT-0042…','[Audit Log]: Signing report with digital timestamp…','✓ Report RPT-0042 generated — ready for submission']
    function confirmGenerate() {
      closeModal()
      document.getElementById('genLog').classList.remove('hidden')
      document.getElementById('genLog').innerHTML = `<div class="bg-slate-950 rounded-2xl border border-slate-800 p-5 space-y-1.5"><p class="text-xs font-bold text-blue-400 mb-2">▶ REPORT GENERATION</p>${genLogs.map(l=>`<p class="font-mono text-xs text-slate-300"><span class="text-blue-400 mr-2">▶</span>${l}</p>`).join('')}</div>`
    }
  </script>
</body>
</html>
